<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Desk Commander</title>
<style>
/* ---- theme tokens ---- */
:root, html[data-theme="light"] {
  color-scheme: light;
  --bg:#f5f4f0; --card:#ffffff; --border:#e7e3da; --line:#f0ede6;
  --text:#1f1d1a; --muted:#6f6a61; --faint:#a39d92; --faint2:#b0aa9e;
  --accent:#1f1d1a; --accent-text:#ffffff; --accent-hover:#3a362f;
  --input-bg:#ffffff; --input-border:#e0dbd1; --pill-bg:#fafaf8;
  --sched-border:#c9d6f0; --chk-on:#4a9d5b; --done:#b0aa9e; --scheduled:#2f8f46;
  --sform-bg:#f7f9f7; --sform-border:#dcebdf; --link:#2d6cdf;
  --toast-bg:#1f1d1a; --toast-text:#ffffff;
}
html[data-theme="dark"] {
  color-scheme: dark;
  --bg:#15171a; --card:#1e2126; --border:#2c3036; --line:#2a2e33;
  --text:#eceef1; --muted:#a6adb6; --faint:#7b828b; --faint2:#5f656c;
  --accent:#eceef1; --accent-text:#15171a; --accent-hover:#d4d8dd;
  --input-bg:#24282d; --input-border:#363b42; --pill-bg:#24282d;
  --sched-border:#3a536f; --chk-on:#4a9d5b; --done:#6f767e; --scheduled:#5dca9a;
  --sform-bg:#1a2a20; --sform-border:#2c4434; --link:#6aa9e9;
  --toast-bg:#eceef1; --toast-text:#15171a;
}
html[data-theme="navy"] {
  color-scheme: dark;
  --bg:#0b1b30; --card:#11294a; --border:#1f3e66; --line:#19355a;
  --text:#e7effb; --muted:#9db4d6; --faint:#6f8bb0; --faint2:#5c769b;
  --accent:#3f82d6; --accent-text:#ffffff; --accent-hover:#356fbb;
  --input-bg:#0e2241; --input-border:#274b78; --pill-bg:#0e2241;
  --sched-border:#2f5b8e; --chk-on:#3ea06a; --done:#5c769b; --scheduled:#57c79a;
  --sform-bg:#0f2742; --sform-border:#27507f; --link:#7fb2ee;
  --toast-bg:#dbe8fb; --toast-text:#0b1b30;
}

* { box-sizing: border-box; }
body {
  margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased;
  transition:background .2s, color .2s;
}
.wrap { max-width:1080px; margin:0 auto; padding:26px 20px 70px; }

/* ---- theme switch ---- */
.theme-switch { position:fixed; top:14px; right:16px; display:flex; gap:2px; padding:3px; z-index:40;
  background:var(--card); border:1px solid var(--border); border-radius:999px; }
.theme-switch button { width:30px; height:30px; padding:0; border:none; background:transparent; cursor:pointer;
  border-radius:999px; color:var(--faint); display:inline-flex; align-items:center; justify-content:center; transition:.12s; }
.theme-switch button:hover { color:var(--text); }
.theme-switch button.active { background:var(--accent); color:var(--accent-text); }
.theme-switch svg { width:16px; height:16px; }

.card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; margin-bottom:16px; }
.card h2 {
  margin:0 0 14px; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
  color:var(--muted); display:flex; align-items:center; gap:8px;
}
.card h2 .count { margin-left:auto; font-weight:600; color:var(--faint2); text-transform:none; letter-spacing:0; }

/* ---- TOP GRID: hero (left) + schedule (right) ---- */
.topgrid { display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1.1fr); gap:16px; align-items:stretch; margin-bottom:16px; }
.schedule-card { margin-bottom:0; border-color:var(--sched-border); }
.schedule-card h2 { justify-content:center; }
.hero { margin-bottom:0; display:flex; flex-direction:column; justify-content:center; }
.hello { font-size:46px; line-height:1.02; font-weight:800; letter-spacing:-0.03em; }
.today-date { color:var(--muted); font-size:18px; margin-top:8px; }
.hero .addrow { margin-top:20px; margin-bottom:0; }

/* add task */
.addrow { display:flex; gap:8px; margin-bottom:14px; }
.addrow input {
  flex:1; font:inherit; font-size:15px; padding:12px 14px; border:1px solid var(--input-border); border-radius:12px; background:var(--input-bg); color:var(--text); min-width:0;
}
.addrow button, .btn {
  font:inherit; font-weight:600; font-size:14px; padding:10px 16px; border:none; border-radius:12px;
  background:var(--accent); color:var(--accent-text); cursor:pointer;
}
.addrow button { width:46px; font-size:20px; padding:0; }
.addrow button:hover,.btn:hover{ background:var(--accent-hover); }

/* agents */
.agents { display:flex; flex-wrap:wrap; gap:8px; }
.agent-btn {
  font:inherit; font-size:14px; font-weight:600; cursor:pointer;
  border:1px solid var(--input-border); background:var(--pill-bg); color:var(--text);
  padding:10px 16px; border-radius:22px; display:inline-flex; align-items:center; gap:8px; transition:.12s;
}
.agent-btn:hover { background:var(--card); border-color:var(--border); transform:translateY(-1px); }
.agent-btn:disabled { opacity:.55; cursor:wait; }
.agent-btn .em { font-size:15px; }
.agent-hint { font-size:12px; color:var(--faint); margin-top:10px; }

/* filters */
.filters { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.chip {
  font-size:12px; font-weight:600; padding:5px 12px; border-radius:20px; cursor:pointer;
  border:1px solid var(--border); background:var(--card); color:var(--muted);
}
.chip.active { background:var(--accent); color:var(--accent-text); border-color:var(--accent); }

/* tasks */
.tasks { list-style:none; margin:0; padding:0; }
.task { padding:14px 0; border-top:1px solid var(--line); }
.task:first-child { border-top:none; }
.task .main { display:flex; gap:12px; align-items:flex-start; }
.task .chk {
  flex:0 0 22px; width:22px; height:22px; margin-top:1px; border:1.5px solid var(--input-border); border-radius:7px;
  cursor:pointer; display:inline-flex; align-items:center; justify-content:center; color:#fff; background:var(--input-bg);
}
.task .chk.on { background:var(--chk-on); border-color:var(--chk-on); }
.task .body { flex:1; min-width:0; }
.task .title { font-size:16px; line-height:1.35; }
.task .title.done { text-decoration:line-through; color:var(--done); }
.task .tags { margin-top:7px; display:flex; flex-wrap:wrap; gap:7px; align-items:center; }
.dchip { font-size:11px; font-weight:600; padding:2px 9px; border-radius:20px; }
.src { font-size:11px; color:var(--faint); }
.src.agent { color:#9b7ddd; font-weight:600; }
.task .acts { display:flex; gap:6px; align-items:center; }
.iconbtn { font:inherit; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--input-border); background:var(--pill-bg); color:var(--text); padding:6px 10px; border-radius:9px; white-space:nowrap; }
.iconbtn:hover { background:var(--card); }
.iconbtn.sched { color:var(--scheduled); }
.del { color:var(--faint2); cursor:pointer; font-size:18px; padding:0 2px; line-height:1; }
.del:hover { color:#e06a5a; }
.scheduled-note { font-size:12px; color:var(--scheduled); font-weight:600; }

/* inline scheduler */
.sched-form { margin-top:10px; padding:11px; background:var(--sform-bg); border:1px solid var(--sform-border); border-radius:11px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.sched-form input { font:inherit; padding:6px 9px; border:1px solid var(--input-border); border-radius:8px; background:var(--input-bg); color:var(--text); }
.sched-form .lbl { font-size:12px; color:var(--muted); }

/* schedule (read) */
.ev { display:flex; gap:12px; padding:9px 0; border-top:1px solid var(--line); }
.ev:first-of-type { border-top:none; }
.ev .time { flex:0 0 60px; font-variant-numeric:tabular-nums; font-weight:700; font-size:15px; }
.ev .time.allday { color:var(--muted); font-weight:500; font-size:13px; }
.ev .dot { flex:0 0 9px; width:9px; height:9px; border-radius:50%; margin-top:6px; }
.ev .summary { font-size:15px; font-weight:500; }
.ev .meta { font-size:13px; color:var(--muted); margin-top:2px; }
.ev .meta a { color:var(--link); text-decoration:none; }
.day-title { font-size:12px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--faint); margin:14px 0 6px; }
.day-title:first-child { margin-top:0; }
.muted { color:var(--faint); font-size:13px; font-style:italic; padding:6px 0; }
.spinner { color:var(--faint); font-size:13px; }
footer.note { text-align:center; color:var(--faint2); font-size:12px; margin-top:22px; }
.toast { position:fixed; left:50%; bottom:22px; transform:translateX(-50%); background:var(--toast-bg); color:var(--toast-text); padding:10px 18px; border-radius:12px; font-size:14px; opacity:0; transition:.25s; pointer-events:none; z-index:50; }
.toast.show { opacity:1; }

@media (max-width:760px){ .topgrid { grid-template-columns:1fr; } .hello { font-size:36px; } }
</style>
</head>
<body>
<div class="theme-switch" id="themeSwitch">
  <button data-theme="light" onclick="setTheme('light')" title="Light" aria-label="Light theme">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  </button>
  <button data-theme="dark" onclick="setTheme('dark')" title="Dark" aria-label="Dark theme">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
  </button>
  <button data-theme="navy" onclick="setTheme('navy')" title="Navy" aria-label="Navy theme">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2.5 7c1.7-2.4 3.3-2.4 5 0s3.3 2.4 5 0 3.3-2.4 5 0"/><path d="M2.5 12c1.7-2.4 3.3-2.4 5 0s3.3 2.4 5 0 3.3-2.4 5 0"/><path d="M2.5 17c1.7-2.4 3.3-2.4 5 0s3.3 2.4 5 0 3.3-2.4 5 0"/></svg>
  </button>
</div>

<div class="wrap">

  <!-- TOP: hero greeting/input (left) + schedule (right) -->
  <div class="topgrid">
    <div class="hero card">
      <div class="hello" id="hello">Hello.</div>
      <div class="today-date" id="todayDate"></div>
      <div class="addrow">
        <input id="newTask" placeholder="What needs doing?">
        <button onclick="addManual()">+</button>
      </div>
    </div>
    <div class="card schedule-card">
      <h2>Upcoming</h2>
      <div id="schedule"><div class="spinner">Loading events…</div></div>
    </div>
  </div>

  <!-- AGENTS -->
  <div class="card">
    <h2>🤖 Agents</h2>
    <div class="agents" id="agents"></div>
    <div class="agent-hint">An agent looks at your tasks in its domain and suggests 3 next steps.</div>
  </div>

  <!-- TASK LIST -->
  <div class="card">
    <h2>Today <span class="count" id="taskCount"></span></h2>
    <div class="filters" id="filters"></div>
    <ul class="tasks" id="tasks"></ul>
  </div>

  <footer class="note">Tasks and agent output are saved in this browser. “To calendar” creates a real event in Google Calendar.</footer>
</div>
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
/* ---- theme ---- */
const THEME_LS = "desk_theme";
function setTheme(t){
  document.documentElement.dataset.theme = t;
  try { localStorage.setItem(THEME_LS, t); } catch(e){}
  document.querySelectorAll("#themeSwitch button").forEach(b=>b.classList.toggle("active", b.dataset.theme===t));
}
setTheme((function(){ try { return localStorage.getItem(THEME_LS)||"light"; } catch(e){ return "light"; } })());

const CAL = "mcp__92f70542-72b3-4446-a904-2368c1f1153d";
const TOOL_LIST = CAL+"__list_events";
const TOOL_CREATE = CAL+"__create_event";
const TZ = "Europe/Belgrade";
const LS = "desk_v2";

/* ---- backend adapter: Cowork runtime OR n8n workflow ----
   The n8n webhook URL is read from app/config.js (copy app/config.example.js → config.js
   and set your URL). config.js is gitignored so the URL never lands in the repo.
   If no config is present, BACKEND.url is empty and the desk falls back to the Cowork runtime. */
const CFG = (typeof window!=="undefined" && window.DESK_CONFIG) ? window.DESK_CONFIG : {};
const BACKEND = {
  url:         CFG.url || "",            // one n8n workflow for everything; we send {action, ...}
  listEvents:  CFG.listEvents || "",     // (optional) separate URLs if you build three workflows
  createEvent: CFG.createEvent || "",
  agent:       CFG.agent || "",
  apiKey:      CFG.apiKey || ""          // n8n API key (only if the trigger has auth)
};
const inCowork = () => (typeof window!=="undefined" && window.cowork && window.cowork.callMcpTool);
function simHeaders(){ const h={"Content-Type":"application/json"}; if(BACKEND.apiKey) h["x-api-key"]=BACKEND.apiKey; return h; }
function simUrl(action){ return BACKEND.url || BACKEND[action]; }
async function simCall(action, body){
  const payload = BACKEND.url ? Object.assign({action}, body) : body;   // single URL -> include action
  const res=await fetch(simUrl(action),{method:"POST",headers:simHeaders(),body:JSON.stringify(payload)});
  if(!res.ok) throw new Error("n8n "+res.status);
  const data = await res.json().catch(()=>({}));
  return (data && data.output!==undefined) ? data.output : data;   // n8n may wrap result in {output:...}
}

/* ---- demo mode: no backend AND not in Cowork (e.g. GitHub Pages) -> sample data ---- */
function demoMode(){ return !simUrl("listEvents") && !simUrl("agent") && !inCowork(); }
function demoEvents(){
  const mk=(addDays,h,m,summary)=>{ const d=new Date(); d.setDate(d.getDate()+addDays); d.setHours(h,m,0,0);
    const e=new Date(d.getTime()+3600000); return {summary, start:{dateTime:d.toISOString()}, end:{dateTime:e.toISOString()}}; };
  return [ mk(0,18,0,"Meetup"), mk(1,12,0,"Interview — Acme"), mk(1,19,30,"Gym — back day"),
           mk(2,10,0,"Course: Intro to ABM"), mk(3,15,0,"Take the cat to the vet") ];
}
function demoTasks(domain){
  const D={
    job:["Update resume with recent wins","Apply to 3 product roles today","Message a former colleague for a referral"],
    fitness:["30-min gym session: legs","10-min mobility before bed","Schedule a rest day Thursday"],
    home:["Cook a batch meal for two days","Quick 15-min kitchen tidy-up","Take out the recycling"],
    study:["Finish module 3 of the course","Prototype one small feature","Review yesterday's notes"],
    general:["Plan the week ahead","20 min of inbox cleanup","Pick one thing to finish today"]
  };
  return D[domain]||D.general;
}

async function apiListEvents(startISO, endISO){
  if(simUrl("listEvents")){
    const data=await simCall("listEvents",{startTime:startISO,endTime:endISO});
    return Array.isArray(data)?data:(data.events||[]);
  }
  if(inCowork()){
    const r=await window.cowork.callMcpTool(TOOL_LIST,{startTime:startISO,endTime:endISO,orderBy:"startTime",pageSize:50});
    const data=r.structuredContent ?? JSON.parse(r.content[0].text);
    return (data&&data.events)||[];
  }
  return demoEvents();   // no backend configured -> sample data (e.g. GitHub Pages)
}
async function apiCreateEvent(payload){
  if(simUrl("createEvent")){ return await simCall("createEvent", payload); }
  if(inCowork()){
    const r=await window.cowork.callMcpTool(TOOL_CREATE,payload);
    const data=r.structuredContent ?? (r.content&&r.content[0]?JSON.parse(r.content[0].text):{});
    if(r.isError) throw new Error((data&&data.error)||"calendar error");
    return data;
  }
  return {ok:true, demo:true};   // demo mode: pretend success
}
async function apiAgent(domain, existing, prompt){
  if(simUrl("agent")){
    const data=await simCall("agent",{domain,existing});
    let arr = Array.isArray(data) ? data : (data.tasks ?? data.items ?? data);
    if(typeof arr === "string") arr = parseList(arr);                 // model often returns the array as a string / in ```json
    if(!Array.isArray(arr)) arr = parseList(typeof data==="string"?data:JSON.stringify(data));
    return arr.map(String).map(s=>s.trim()).filter(Boolean);
  }
  if(inCowork()){
    return parseList(await window.cowork.askClaude(prompt, []));
  }
  return demoTasks(domain);   // demo mode: canned suggestions
}

/* domains */
const DOMAINS = {
  job:     {label:"Job search",   emoji:"🔍", color:"7",  chip:"#eef4ff", chipText:"#2d6cdf", dot:"#2d6cdf"},
  fitness: {label:"Fitness & body",emoji:"💪", color:"10", chip:"#e8f6ec", chipText:"#2f8f46", dot:"#2f8f46"},
  home:    {label:"Home",         emoji:"🏠", color:"5",  chip:"#fff4e0", chipText:"#b8860b", dot:"#e0a82e"},
  study:   {label:"Projects & learning", emoji:"📚", color:"3",  chip:"#f1edf9", chipText:"#7b53c9", dot:"#7b53c9"},
  general: {label:"Other",        emoji:"•",  color:"8",  chip:"#e9e7e2", chipText:"#6f6a61", dot:"#b0aa9e"}
};
const AGENTS = [
  {domain:"job",     prompt:"You are a job-search agent for someone looking for work in product management and data analytics. Based on the existing tasks, suggest EXACTLY 3 new, concrete, distinct next steps for the next 1-2 days (e.g. update a resume section, apply to a specific kind of role, message a former colleague, prep an answer to a common interview question). Short and actionable."},
  {domain:"fitness", prompt:"You are a fitness agent. Suggest EXACTLY 3 concrete, distinct tasks for the next few days: one gym workout, one mobility/stretching item, one about recovery or routine. Consider the existing tasks, don't repeat."},
  {domain:"home",    prompt:"You are a home/chores agent. Suggest EXACTLY 3 small concrete home tasks for the next few days: one about cooking/food, one about cleaning, one about a household routine. Keep it short."},
  {domain:"study",   prompt:"You are a projects & learning agent. Suggest EXACTLY 3 concrete next steps for current projects or studies (e.g. finish a course module, build a prototype, review notes). Keep it short."}
];

/* state */
let state = load();
function load(){ try { return Object.assign({tasks:[],filter:"all"}, JSON.parse(localStorage.getItem(LS)||"{}")); } catch(e){ return {tasks:[],filter:"all"}; } }
function save(){ localStorage.setItem(LS, JSON.stringify(state)); }

/* header */
const now = new Date();
document.getElementById("todayDate").textContent =
  now.toLocaleDateString("en-US",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
const hr = now.getHours();
document.getElementById("hello").textContent =
  (hr<6?"Good night":hr<12?"Good morning":hr<18?"Good afternoon":"Good evening")+", Nat.";

/* toast */
let toastT;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2600); }

/* ---- agents ---- */
function renderAgents(){
  document.getElementById("agents").innerHTML = AGENTS.map((a,i)=>{
    const d=DOMAINS[a.domain];
    return '<button class="agent-btn" id="ag'+i+'" onclick="runAgent('+i+')"><span class="em">'+d.emoji+'</span>'+d.label+'</button>';
  }).join("");
}
async function runAgent(i){
  const a=AGENTS[i], d=DOMAINS[a.domain], btn=document.getElementById("ag"+i);
  btn.disabled=true; const orig=btn.innerHTML; btn.innerHTML='<span class="em">⏳</span>thinking…';
  const existing = state.tasks.filter(t=>t.domain===a.domain).map(t=>t.title);
  const prompt = a.prompt +
    "\n\nCurrent tasks in this domain: " + (existing.length?existing.join("; "):"none yet") +
    "\n\nReturn ONLY a JSON array of 3 strings in English, no explanation. Each string is one task, up to 9 words. Example: [\"...\",\"...\",\"...\"]";
  try {
    const items = await apiAgent(a.domain, existing, prompt);
    if(!items.length){ toast("Agent returned nothing, try again"); }
    else {
      items.slice(0,3).forEach(title=>state.tasks.unshift(mkTask(title, d.label+" · agent", a.domain, true)));
      save(); renderTasks(); toast(d.emoji+" Added "+Math.min(3,items.length)+" tasks");
    }
  } catch(e){ toast("Agent error: "+(e&&e.message?e.message:e)); }
  btn.disabled=false; btn.innerHTML=orig;
}
function parseList(raw){
  let text = typeof raw==="string" ? raw : (raw && raw.content && raw.content[0] && raw.content[0].text) ? raw.content[0].text : (raw && raw.text) ? raw.text : JSON.stringify(raw);
  const m = text.match(/\[[\s\S]*\]/);
  if(m){ try { const arr=JSON.parse(m[0]); if(Array.isArray(arr)) return arr.map(String).map(s=>s.trim()).filter(Boolean); } catch(e){} }
  return text.split(/\n+/).map(s=>s.replace(/^[\s\-\d\.\)•]+/,"").trim()).filter(s=>s.length>2).slice(0,3);
}

/* ---- tasks ---- */
let idc = Date.now();
function mkTask(title, source, domain, fromAgent){ return {id:idc++, title, source, domain, fromAgent:!!fromAgent, done:false, when:null, schedOpen:false}; }
function addManual(){
  const el=document.getElementById("newTask"); const v=el.value.trim(); if(!v) return;
  state.tasks.unshift(mkTask(v, "Me", guessDomain(v), false)); el.value=""; save(); renderTasks();
}
function guessDomain(t){
  const s=t.toLowerCase();
  if(/resume|cv|vacanc|offer|interview|appl(y|ication)|recruit|hr|linkedin|job/.test(s)) return "job";
  if(/gym|workout|train|squat|stretch|run|yoga|sport|muscle|cardio|mobility/.test(s)) return "fitness";
  if(/clean|cook|food|dishes|laundry|grocer|kitchen|chore|tidy/.test(s)) return "home";
  if(/project|course|study|learn|module|prototype|notes|chapter|algorithm/.test(s)) return "study";
  return "general";
}
function renderFilters(){
  const counts={all:state.tasks.length};
  Object.keys(DOMAINS).forEach(k=>counts[k]=state.tasks.filter(t=>t.domain===k).length);
  let html='<span class="chip '+(state.filter==="all"?"active":"")+'" onclick="setFilter(\'all\')">All · '+counts.all+'</span>';
  Object.keys(DOMAINS).forEach(k=>{ if(counts[k]) html+='<span class="chip '+(state.filter===k?"active":"")+'" onclick="setFilter(\''+k+'\')">'+DOMAINS[k].emoji+' '+DOMAINS[k].label+' · '+counts[k]+'</span>'; });
  document.getElementById("filters").innerHTML=html;
}
function setFilter(f){ state.filter=f; save(); renderTasks(); }
function renderTasks(){
  renderFilters();
  const ul=document.getElementById("tasks");
  let list = state.tasks.slice();
  if(state.filter!=="all") list=list.filter(t=>t.domain===state.filter);
  list.sort((a,b)=>(a.done-b.done));
  document.getElementById("taskCount").textContent = state.tasks.filter(t=>!t.done).length+" active";
  if(!list.length){ ul.innerHTML='<li class="muted">Empty. Add a task yourself or tap an agent above.</li>'; return; }
  ul.innerHTML = list.map(t=>{
    const d=DOMAINS[t.domain]||DOMAINS.general;
    const dchip='<span class="dchip" style="background:'+d.chip+';color:'+d.chipText+'">'+d.emoji+' '+d.label+'</span>';
    const src='<span class="src '+(t.fromAgent?"agent":"")+'">'+(t.fromAgent?"🤖 ":"")+esc(t.source)+'</span>';
    const schedNote = t.when ? '<span class="scheduled-note">📅 '+fmtWhen(t.when)+'</span>' : '';
    const schedBtn = t.when ? '' : '<button class="iconbtn sched" onclick="toggleSched('+t.id+')">📅 to calendar</button>';
    const form = t.schedOpen ? schedForm(t) : '';
    return '<li class="task"><div class="main">'+
      '<span class="chk'+(t.done?" on":"")+'" onclick="toggleDone('+t.id+')">'+(t.done?"✓":"")+'</span>'+
      '<div class="body"><div class="title'+(t.done?" done":"")+'">'+esc(t.title)+'</div>'+
      '<div class="tags">'+dchip+src+schedNote+'</div>'+form+'</div>'+
      '<div class="acts">'+schedBtn+'<span class="del" onclick="delTask('+t.id+')">×</span></div>'+
      '</div></li>';
  }).join("");
}
function schedForm(t){
  const def=defaultWhen();
  return '<div class="sched-form">'+
    '<span class="lbl">Date</span><input type="date" id="sd'+t.id+'" value="'+def.date+'">'+
    '<span class="lbl">Time</span><input type="time" id="st'+t.id+'" value="'+def.time+'">'+
    '<button class="btn" onclick="schedule('+t.id+')">Create event</button>'+
    '<button class="iconbtn" onclick="toggleSched('+t.id+')">cancel</button></div>';
}
function defaultWhen(){ const d=new Date(); d.setDate(d.getDate()+1); return {date:d.toISOString().slice(0,10), time:"10:00"}; }
function toggleDone(id){ const t=find(id); if(t){t.done=!t.done; save(); renderTasks();} }
function delTask(id){ state.tasks=state.tasks.filter(t=>t.id!==id); save(); renderTasks(); }
function toggleSched(id){ const t=find(id); if(t){ t.schedOpen=!t.schedOpen; save(); renderTasks(); } }
function find(id){ return state.tasks.find(t=>t.id===id); }

async function schedule(id){
  const t=find(id); if(!t) return;
  const date=document.getElementById("sd"+id).value, time=document.getElementById("st"+id).value;
  if(!date||!time){ toast("Pick a date and time"); return; }
  const dt=new Date(date+"T"+time+":00Z");
  const start=dt.toISOString().slice(0,19);
  const end=new Date(dt.getTime()+60*60000).toISOString().slice(0,19);
  const d=DOMAINS[t.domain]||DOMAINS.general;
  toast("Creating event…");
  try {
    await apiCreateEvent({ summary:t.title, startTime:start, endTime:end, timeZone:TZ, colorId:d.color, description:"Created from Desk Commander ("+t.source+")" });
    t.when=start; t.schedOpen=false; save(); renderTasks(); loadSchedule(); toast("✅ On calendar: "+fmtWhen(start));
  } catch(e){ toast("Couldn't create event: "+(e&&e.message?e.message:e)); }
}
function fmtWhen(iso){ const d=new Date(iso+"Z"); return d.toLocaleString("en-US",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit",timeZone:TZ}); }

/* ---- schedule read ---- */
async function loadSchedule(){
  const el=document.getElementById("schedule");
  const start=new Date(); start.setHours(0,0,0,0);
  const end=new Date(start); end.setDate(end.getDate()+7);
  try {
    const events = await apiListEvents(start.toISOString(), end.toISOString());
    renderSchedule(events);
  } catch(e){ el.innerHTML='<div class="muted">Couldn\'t load the calendar.</div>'; }
}
function evStart(ev){
  if(ev.start&&ev.start.dateTime) return {date:new Date(ev.start.dateTime),allDay:false};
  if(ev.start&&ev.start.date) return {date:new Date(ev.start.date+"T00:00:00"),allDay:true};
  return {date:null,allDay:false};
}
function guessEventDomain(ev){
  const s=((ev.summary||"")+" "+(ev.location||"")).toLowerCase();
  if(/gym|workout|train|squat|stretch|run|yoga|sport|muscle|cardio|back|legs/.test(s)) return "fitness";
  if(/interview|recruit|vacanc|hr|offer/.test(s)) return "job";
  if(/course|lesson|class|lecture|module|study/.test(s)) return "study";
  return "general";
}
function renderSchedule(events){
  const el=document.getElementById("schedule");
  if(!events.length){ el.innerHTML='<div class="muted">No events in the next week.</div>'; return; }
  const byDay={};
  events.forEach(ev=>{ const s=evStart(ev); if(!s.date) return; const k=s.date.toISOString().slice(0,10); (byDay[k]=byDay[k]||[]).push({ev,s}); });
  const todayKey=new Date().toISOString().slice(0,10);
  const tmr=new Date(); tmr.setDate(tmr.getDate()+1); const tmrKey=tmr.toISOString().slice(0,10);
  let html="";
  Object.keys(byDay).sort().forEach(k=>{
    const d=new Date(k+"T00:00:00");
    const label = k===todayKey?"Today" : k===tmrKey?"Tomorrow" : d.toLocaleDateString("en-US",{weekday:"long",day:"numeric",month:"long"});
    html+='<div class="day-title">'+label+'</div>';
    byDay[k].sort((a,b)=>a.s.date-b.s.date).forEach(({ev,s})=>{
      const time=s.allDay?"all day":s.date.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
      const dom=DOMAINS[guessEventDomain(ev)];
      const loc=ev.location?esc(ev.location.split(",")[0]):"";
      const meet=ev.conferenceUrl?'<a href="'+ev.conferenceUrl+'" target="_blank">video ↗</a>':"";
      const meta=[loc,meet].filter(Boolean).join(" · ");
      html+='<div class="ev"><div class="time'+(s.allDay?" allday":"")+'">'+time+'</div>'+
            '<span class="dot" style="background:'+dom.dot+'"></span>'+
            '<div><div class="summary">'+esc(ev.summary||"(no title)")+'</div>'+
            (meta?'<div class="meta">📍 '+meta+'</div>':'')+'</div></div>';
    });
  });
  el.innerHTML=html;
}

function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
document.getElementById("newTask").addEventListener("keydown",e=>{ if(e.key==="Enter") addManual(); });

if(demoMode()){ document.querySelector("footer.note").textContent = "Demo mode — sample data. Agents & calendar are mocked; connect an n8n backend (see README) for the live version."; }
renderAgents(); renderTasks(); loadSchedule();
</script>
</body>
